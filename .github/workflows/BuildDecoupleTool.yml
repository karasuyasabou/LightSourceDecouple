name: Build Decouple Tool

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon (M1/M2/M3) - Native build on macOS 15
          - os: macos-15
            platform: macos
            arch: arm64
            python_arch: arm64
            icon_file: icons/app.icns
            sep: ':'
            artifact_name: DecoupleTool-macOS-arm64.zip
          
          # Intel Mac (x64) - Build on macOS 14 via Rosetta (x64 Python)
          - os: macos-14
            platform: macos
            arch: x64
            python_arch: x64
            icon_file: icons/app.icns
            sep: ':'
            artifact_name: DecoupleTool-macOS-x64.zip

          # Windows
          - os: windows-latest
            platform: windows
            arch: x64
            python_arch: x64
            icon_file: icons/app.ico
            sep: ';'
            artifact_name: DecoupleTool-Windows-x64.zip

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go 1.25
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'

    - name: Set up MSYS2 toolchain (Windows)
      if: matrix.platform == 'windows'
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        path-type: inherit
        install: >-
          git
          make
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-pkgconf

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: ${{ matrix.python_arch }}

    - name: Install vcpkg (macOS)
      if: matrix.platform == 'macos'
      run: |
        git clone https://github.com/microsoft/vcpkg "$GITHUB_WORKSPACE/vcpkg"
        "$GITHUB_WORKSPACE/vcpkg/bootstrap-vcpkg.sh"

    - name: Install vcpkg (Windows)
      if: matrix.platform == 'windows'
      shell: pwsh
      run: |
        git clone https://github.com/microsoft/vcpkg "$env:GITHUB_WORKSPACE\vcpkg"
        & "$env:GITHUB_WORKSPACE\vcpkg\bootstrap-vcpkg.bat"

    - name: Build open-make-tiff CLI (macOS)
      if: matrix.platform == 'macos'
      run: |
        cd third_party/open_make_tiff
        export VCPKG_ROOT="$GITHUB_WORKSPACE/vcpkg"
        if [ "${{ matrix.arch }}" = "arm64" ]; then
          make vcpkg-install-macos-arm64
          OMT_TRIPLET="arm64-osx-release"
          export GOARCH="arm64"
          export CC="clang -arch arm64"
        else
          make vcpkg-install-macos-x64
          OMT_TRIPLET="x64-osx-release"
          export GOARCH="amd64"
          export CC="clang -arch x86_64"
        fi
        make exiftool-download-macos
        export PKG_CONFIG_PATH="$VCPKG_ROOT/installed/$OMT_TRIPLET/lib/pkgconfig"
        export GOOS="darwin"
        export CGO_ENABLED="1"
        mkdir -p "$GITHUB_WORKSPACE/build/open_make_tiff" "$GITHUB_WORKSPACE/build/third-party"
        go build -o "$GITHUB_WORKSPACE/build/open_make_tiff/open-make-tiff" ./cmd/open-make-tiff-cli
        cp -R third-party/macos-universal/. "$GITHUB_WORKSPACE/build/third-party/"
        chmod +x "$GITHUB_WORKSPACE/build/open_make_tiff/open-make-tiff"

    - name: Build open-make-tiff CLI (Windows)
      if: matrix.platform == 'windows'
      shell: msys2 {0}
      run: |
        cd third_party/open_make_tiff
        export VCPKG_ROOT="$(cygpath -m "$GITHUB_WORKSPACE/vcpkg")"
        make vcpkg-install-windows
        powershell -ExecutionPolicy Bypass -File scripts/download-exiftool.ps1 -Version 13.55
        export PKG_CONFIG_PATH="$(cygpath -m "$GITHUB_WORKSPACE/vcpkg/installed/x64-mingw-static-release/lib/pkgconfig")"
        export GOOS="windows"
        export GOARCH="amd64"
        export CGO_ENABLED="1"
        export CC="x86_64-w64-mingw32-gcc"
        mkdir -p "$GITHUB_WORKSPACE/build/open_make_tiff" "$GITHUB_WORKSPACE/build/third-party"
        go build -o "$GITHUB_WORKSPACE/build/open_make_tiff/open-make-tiff.exe" ./cmd/open-make-tiff-cli
        cp -R third-party/windows-x64/. "$GITHUB_WORKSPACE/build/third-party/"

    - name: Install dependencies
      run: |
        # 定义 Rosetta 前缀
        PREFIX=""
        if [[ "${{ matrix.platform }}" == "macos" && "${{ matrix.arch }}" == "x64" ]]; then
          PREFIX="arch -x86_64"
        fi
        
        echo "Build architecture context:"
        $PREFIX uname -m
        
        $PREFIX python -m pip install --upgrade pip setuptools wheel
        $PREFIX pip install PySide6 numpy tifffile imagecodecs Pillow pyinstaller pyinstaller-hooks-contrib

    - name: Prepare app icon (macOS)
      if: matrix.platform == 'macos'
      run: |
        if [ ! -f "icon.png" ]; then echo "::warning::icon.png not found"; exit 0; fi
        mkdir -p icons/icon.iconset
        
        # 【核心修复】补全所有路径的 icons/ 前缀
        sips -z 16 16     "icon.png" --out icons/icon.iconset/icon_16x16.png
        sips -z 32 32     "icon.png" --out icons/icon.iconset/icon_16x16@2x.png
        sips -z 32 32     "icon.png" --out icons/icon.iconset/icon_32x32.png
        sips -z 64 64     "icon.png" --out icons/icon.iconset/icon_32x32@2x.png
        sips -z 128 128   "icon.png" --out icons/icon.iconset/icon_128x128.png
        sips -z 256 256   "icon.png" --out icons/icon.iconset/icon_128x128@2x.png
        sips -z 256 256   "icon.png" --out icons/icon.iconset/icon_256x256.png
        sips -z 512 512   "icon.png" --out icons/icon.iconset/icon_256x256@2x.png
        sips -z 512 512   "icon.png" --out icons/icon.iconset/icon_512x512.png
        sips -z 1024 1024 "icon.png" --out icons/icon.iconset/icon_512x512@2x.png
        
        iconutil -c icns -o icons/app.icns icons/icon.iconset
        echo "✅ Generated icons/app.icns"

    - name: Prepare app icon (Windows)
      if: matrix.platform == 'windows'
      run: |
        mkdir icons
        python -c "from PIL import Image; img=Image.open('icon.png'); img.save('icons/app.ico', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])"
        echo "✅ Generated icons/app.ico"

    - name: Build with PyInstaller
      run: |
        ICON_ARG=""
        if [ -f "${{ matrix.icon_file }}" ]; then ICON_ARG="--icon=${{ matrix.icon_file }}"; fi
        OMT_BINARY="build/open_make_tiff/open-make-tiff"
        if [ "${{ matrix.platform }}" = "windows" ]; then OMT_BINARY="build/open_make_tiff/open-make-tiff.exe"; fi
        
        PREFIX=""
        if [[ "${{ matrix.platform }}" == "macos" && "${{ matrix.arch }}" == "x64" ]]; then
          PREFIX="arch -x86_64"
        fi

        PYI_ARCH_ARG=""
        if [ "${{ matrix.platform }}" = "macos" ]; then
           if [ "${{ matrix.arch }}" = "x64" ]; then
             PYI_ARCH_ARG="--target-arch x86_64"
           elif [ "${{ matrix.arch }}" = "arm64" ]; then
             PYI_ARCH_ARG="--target-arch arm64"
           fi
        fi

        # Using --onedir for faster startup
        $PREFIX python -m PyInstaller --clean --noconfirm --windowed --noconsole --onedir \
          --name "DecoupleTool" \
          $ICON_ARG \
          $PYI_ARCH_ARG \
          --add-data "icon.png${{ matrix.sep }}." \
          --add-data "icc${{ matrix.sep }}icc" \
          --add-binary "$OMT_BINARY${{ matrix.sep }}." \
          --add-data "build/third-party${{ matrix.sep }}third-party" \
          --collect-all imagecodecs \
          --collect-all tifffile \
          decouple_tool.py

    - name: Package macOS App
      if: matrix.platform == 'macos'
      run: |
        cd dist
        chmod +x DecoupleTool.app/Contents/MacOS/DecoupleTool
        ditto -c -k --sequesterRsrc --keepParent DecoupleTool.app ${{ matrix.artifact_name }}

    - name: Package Windows App
      if: matrix.platform == 'windows'
      run: |
        cd dist
        powershell Compress-Archive -Path DecoupleTool -DestinationPath ${{ matrix.artifact_name }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/${{ matrix.artifact_name }}

  release:
    name: Publish v1.5 Release
    if: github.ref == 'refs/heads/main' && github.event.head_commit.message == 'Release v1.5'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-assets

    - name: Gather release files
      run: |
        mkdir -p release-files
        find release-assets -type f -name '*.zip' -exec cp {} release-files/ \;
        ls -lh release-files

    - name: Create or update release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.5
        name: v1.5
        files: |
          release-files/DecoupleTool-macOS-arm64.zip
          release-files/DecoupleTool-macOS-x64.zip
          release-files/DecoupleTool-Windows-x64.zip
        generate_release_notes: true
