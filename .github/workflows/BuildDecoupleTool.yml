name: Build Decouple Tool

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon (M1/M2/M3) - Native build on macOS 15
          - os: macos-15
            platform: macos
            arch: arm64
            python_arch: arm64
            icon_file: icons/app.icns
            sep: ':'
            artifact_name: DecoupleTool-macOS-arm64.zip

          # Intel Mac (x64) - Build on macOS 14 via Rosetta (x64 Python)
          - os: macos-14
            platform: macos
            arch: x64
            python_arch: x64
            icon_file: icons/app.icns
            sep: ':'
            artifact_name: DecoupleTool-macOS-x64.zip

          # Windows
          - os: windows-latest
            platform: windows
            arch: x64
            python_arch: x64
            icon_file: icons/app.ico
            sep: ';'
            artifact_name: DecoupleTool-Windows-x64.zip

          # Linux x64
          - os: ubuntu-22.04
            platform: linux
            arch: x64
            python_arch: x64
            icon_file: ""
            sep: ':'
            artifact_name: DecoupleTool-Linux-x64.zip

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go 1.25
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'

    - name: Set up MSYS2 toolchain (Windows)
      if: matrix.platform == 'windows'
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        path-type: inherit
        install: >-
          git
          make
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-pkgconf

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: ${{ matrix.python_arch }}

    - name: Install vcpkg (macOS / Linux)
      if: matrix.platform == 'macos' || matrix.platform == 'linux'
      run: |
        git clone https://github.com/microsoft/vcpkg "$GITHUB_WORKSPACE/vcpkg"
        "$GITHUB_WORKSPACE/vcpkg/bootstrap-vcpkg.sh"

    - name: Install vcpkg (Windows)
      if: matrix.platform == 'windows'
      shell: pwsh
      run: |
        git clone https://github.com/microsoft/vcpkg "$env:GITHUB_WORKSPACE\vcpkg"
        & "$env:GITHUB_WORKSPACE\vcpkg\bootstrap-vcpkg.bat"

    - name: Install Linux system dependencies
      if: matrix.platform == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake ninja-build pkg-config nasm \
          libgl1 libglib2.0-dev curl zip unzip tar \
          perl

    - name: Build open-make-tiff CLI (macOS)
      if: matrix.platform == 'macos'
      run: |
        cd third_party/open_make_tiff
        export VCPKG_ROOT="$GITHUB_WORKSPACE/vcpkg"
        if [ "${{ matrix.arch }}" = "arm64" ]; then
          make vcpkg-install-macos-arm64
          OMT_TRIPLET="arm64-osx-release"
          export GOARCH="arm64"
          export CC="clang -arch arm64"
        else
          make vcpkg-install-macos-x64
          OMT_TRIPLET="x64-osx-release"
          export GOARCH="amd64"
          export CC="clang -arch x86_64"
        fi
        make exiftool-download-macos
        export PKG_CONFIG_PATH="$VCPKG_ROOT/installed/$OMT_TRIPLET/lib/pkgconfig"
        export GOOS="darwin"
        export CGO_ENABLED="1"
        mkdir -p "$GITHUB_WORKSPACE/build/open_make_tiff" "$GITHUB_WORKSPACE/build/third-party"
        go build -o "$GITHUB_WORKSPACE/build/open_make_tiff/open-make-tiff" ./cmd/open-make-tiff-cli
        cp -R third-party/macos-universal/. "$GITHUB_WORKSPACE/build/third-party/"
        chmod +x "$GITHUB_WORKSPACE/build/open_make_tiff/open-make-tiff"

    - name: Build open-make-tiff CLI (Windows)
      if: matrix.platform == 'windows'
      shell: msys2 {0}
      run: |
        cd third_party/open_make_tiff
        export VCPKG_ROOT="$(cygpath -m "$GITHUB_WORKSPACE/vcpkg")"
        make vcpkg-install-windows
        powershell -ExecutionPolicy Bypass -File scripts/download-exiftool.ps1 -Version 13.55
        export PKG_CONFIG_PATH="$(cygpath -m "$GITHUB_WORKSPACE/vcpkg/installed/x64-mingw-static-release/lib/pkgconfig")"
        export GOOS="windows"
        export GOARCH="amd64"
        export CGO_ENABLED="1"
        export CC="x86_64-w64-mingw32-gcc"
        mkdir -p "$GITHUB_WORKSPACE/build/open_make_tiff" "$GITHUB_WORKSPACE/build/third-party"
        go build -o "$GITHUB_WORKSPACE/build/open_make_tiff/open-make-tiff.exe" ./cmd/open-make-tiff-cli
        cp -R third-party/windows-x64/. "$GITHUB_WORKSPACE/build/third-party/"

    - name: Build open-make-tiff CLI (Linux)
      if: matrix.platform == 'linux'
      run: |
        cd third_party/open_make_tiff
        export VCPKG_ROOT="$GITHUB_WORKSPACE/vcpkg"
        # Exclude dngsdk and dng-lossy: both pull in adobe-dng-sdk which has
        # no Linux support. libraw's built-in DNG decoder covers all common
        # RAW formats; EnableDNGSDK() failure is handled gracefully in runner.go.
        $VCPKG_ROOT/vcpkg install \
          "libraw[6by9rpi,demosaic-pack-gpl2,demosaic-pack-gpl3,rawspeed,rawspeed3,x3ftools]" \
          "tiff[cxx,jpeg,lerc,libdeflate,lzma,webp,zip,zstd]" \
          --overlay-ports=third-party/vcpkg/ports \
          --overlay-triplets=third-party/vcpkg/triplets \
          --triplet=x64-linux-release \
          --recurse

        # Inject rawspeed3 libs directly into libraw_r.pc after -lraw_r.
        # portfile.cmake's string-replace injection into the Requires field may
        # silently fail if the generated .pc file uses a different spacing format.
        # Modifying Libs directly here guarantees correct static-link order
        # (-lraw_r before -lrawspeed3) and works regardless of binary caching.
        LIBRAW_R_PC="$VCPKG_ROOT/installed/x64-linux-release/lib/pkgconfig/libraw_r.pc"
        if [ -f "$LIBRAW_R_PC" ] && ! grep -q lrawspeed3 "$LIBRAW_R_PC"; then
            sed -i 's/-lraw_r/-lraw_r -lrawspeed3 -lrawspeed -lpugixml/g' "$LIBRAW_R_PC"
        fi

        # Download ExifTool (Perl script, works on Linux with system Perl)
        EXIFTOOL_VERSION="13.55"
        mkdir -p third-party/linux-x64
        curl -L -o /tmp/exiftool-linux.tar.gz \
          "https://sourceforge.net/projects/exiftool/files/Image-ExifTool-${EXIFTOOL_VERSION}.tar.gz/download"
        tar xzf /tmp/exiftool-linux.tar.gz -C /tmp
        cp /tmp/Image-ExifTool-${EXIFTOOL_VERSION}/exiftool third-party/linux-x64/exiftool
        cp -r /tmp/Image-ExifTool-${EXIFTOOL_VERSION}/lib third-party/linux-x64/lib
        chmod +x third-party/linux-x64/exiftool
        rm -rf /tmp/Image-ExifTool-${EXIFTOOL_VERSION} /tmp/exiftool-linux.tar.gz

        export PKG_CONFIG_PATH="$VCPKG_ROOT/installed/x64-linux-release/lib/pkgconfig"
        export GOOS="linux"
        export GOARCH="amd64"
        export CGO_ENABLED="1"
        # libraw is C++; static link requires the C++ stdlib and math lib
        export CGO_LDFLAGS="-lstdc++ -lm"
        mkdir -p "$GITHUB_WORKSPACE/build/open_make_tiff" "$GITHUB_WORKSPACE/build/third-party"
        go build -o "$GITHUB_WORKSPACE/build/open_make_tiff/open-make-tiff" ./cmd/open-make-tiff-cli
        cp -R third-party/linux-x64/. "$GITHUB_WORKSPACE/build/third-party/"
        chmod +x "$GITHUB_WORKSPACE/build/open_make_tiff/open-make-tiff"

    - name: Install dependencies
      run: |
        # 定义 Rosetta 前缀
        PREFIX=""
        if [[ "${{ matrix.platform }}" == "macos" && "${{ matrix.arch }}" == "x64" ]]; then
          PREFIX="arch -x86_64"
        fi
        
        echo "Build architecture context:"
        $PREFIX uname -m
        
        $PREFIX python -m pip install --upgrade pip setuptools wheel
        $PREFIX pip install PySide6 numpy tifffile imagecodecs Pillow pyinstaller pyinstaller-hooks-contrib

    - name: Prepare app icon (macOS)
      if: matrix.platform == 'macos'
      run: |
        if [ ! -f "icon.png" ]; then echo "::warning::icon.png not found"; exit 0; fi
        mkdir -p icons/icon.iconset
        
        # 【核心修复】补全所有路径的 icons/ 前缀
        sips -z 16 16     "icon.png" --out icons/icon.iconset/icon_16x16.png
        sips -z 32 32     "icon.png" --out icons/icon.iconset/icon_16x16@2x.png
        sips -z 32 32     "icon.png" --out icons/icon.iconset/icon_32x32.png
        sips -z 64 64     "icon.png" --out icons/icon.iconset/icon_32x32@2x.png
        sips -z 128 128   "icon.png" --out icons/icon.iconset/icon_128x128.png
        sips -z 256 256   "icon.png" --out icons/icon.iconset/icon_128x128@2x.png
        sips -z 256 256   "icon.png" --out icons/icon.iconset/icon_256x256.png
        sips -z 512 512   "icon.png" --out icons/icon.iconset/icon_256x256@2x.png
        sips -z 512 512   "icon.png" --out icons/icon.iconset/icon_512x512.png
        sips -z 1024 1024 "icon.png" --out icons/icon.iconset/icon_512x512@2x.png
        
        iconutil -c icns -o icons/app.icns icons/icon.iconset
        echo "✅ Generated icons/app.icns"

    - name: Prepare app icon (Windows)
      if: matrix.platform == 'windows'
      run: |
        mkdir icons
        python -c "from PIL import Image; img=Image.open('icon.png'); img.save('icons/app.ico', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])"
        echo "✅ Generated icons/app.ico"

    - name: Build with PyInstaller
      run: |
        ICON_ARG=""
        if [ -f "${{ matrix.icon_file }}" ]; then ICON_ARG="--icon=${{ matrix.icon_file }}"; fi
        OMT_BINARY="build/open_make_tiff/open-make-tiff"
        if [ "${{ matrix.platform }}" = "windows" ]; then OMT_BINARY="build/open_make_tiff/open-make-tiff.exe"; fi

        PREFIX=""
        if [[ "${{ matrix.platform }}" == "macos" && "${{ matrix.arch }}" == "x64" ]]; then
          PREFIX="arch -x86_64"
        fi

        PYI_ARCH_ARG=""
        if [ "${{ matrix.platform }}" = "macos" ]; then
           if [ "${{ matrix.arch }}" = "x64" ]; then
             PYI_ARCH_ARG="--target-arch x86_64"
           elif [ "${{ matrix.arch }}" = "arm64" ]; then
             PYI_ARCH_ARG="--target-arch arm64"
           fi
        fi

        # --windowed / --noconsole suppresses the terminal on macOS/Windows;
        # on Linux the flag is harmless but we keep parity with other platforms.
        $PREFIX python -m PyInstaller --clean --noconfirm --windowed --noconsole --onedir \
          --name "DecoupleTool" \
          $ICON_ARG \
          $PYI_ARCH_ARG \
          --add-data "icon.png${{ matrix.sep }}." \
          --add-data "icc${{ matrix.sep }}icc" \
          --add-binary "$OMT_BINARY${{ matrix.sep }}." \
          --add-data "build/third-party${{ matrix.sep }}third-party" \
          --collect-all imagecodecs \
          --collect-all tifffile \
          decouple_tool.py

    - name: Package macOS App
      if: matrix.platform == 'macos'
      run: |
        cd dist
        chmod +x DecoupleTool.app/Contents/MacOS/DecoupleTool
        ditto -c -k --sequesterRsrc --keepParent DecoupleTool.app ${{ matrix.artifact_name }}

    - name: Package Windows App
      if: matrix.platform == 'windows'
      run: |
        cd dist
        powershell Compress-Archive -Path DecoupleTool -DestinationPath ${{ matrix.artifact_name }}

    - name: Package Linux App
      if: matrix.platform == 'linux'
      run: |
        # zip
        cd dist && zip -r DecoupleTool-Linux-x64.zip DecoupleTool && cd ..

        # AppImage
        wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
          -O /tmp/appimagetool
        chmod +x /tmp/appimagetool

        # Build AppDir: copy PyInstaller onedir output, then add AppImage metadata
        mkdir -p AppDir
        cp -r dist/DecoupleTool/. AppDir/

        cat > AppDir/DecoupleTool.desktop << 'DESKTOP'
        [Desktop Entry]
        Name=DecoupleTool
        Exec=DecoupleTool
        Icon=DecoupleTool
        Type=Application
        Categories=Graphics;Photography;
        DESKTOP

        cp icon.png AppDir/DecoupleTool.png

        cat > AppDir/AppRun << 'APPRUN'
        #!/bin/bash
        HERE=$(dirname "$(readlink -f "$0")")
        exec "$HERE/DecoupleTool" "$@"
        APPRUN
        chmod +x AppDir/AppRun

        # --appimage-extract-and-run avoids FUSE requirement on CI runners
        ARCH=x86_64 /tmp/appimagetool --appimage-extract-and-run \
          AppDir dist/DecoupleTool-Linux-x64.AppImage

    - name: Upload Artifact
      if: matrix.platform != 'linux'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/${{ matrix.artifact_name }}

    - name: Upload Linux Artifacts
      if: matrix.platform == 'linux'
      uses: actions/upload-artifact@v4
      with:
        name: DecoupleTool-Linux-x64
        path: |
          dist/DecoupleTool-Linux-x64.zip
          dist/DecoupleTool-Linux-x64.AppImage

  release:
    name: Publish v1.6 Release
    if: github.ref == 'refs/heads/main' && github.event.head_commit.message == 'Release v1.6'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-assets

    - name: Gather release files
      run: |
        mkdir -p release-files
        find release-assets -type f \( -name '*.zip' -o -name '*.AppImage' \) \
          -exec cp {} release-files/ \;
        ls -lh release-files

    - name: Create or update release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.6
        name: v1.6
        files: |
          release-files/DecoupleTool-macOS-arm64.zip
          release-files/DecoupleTool-macOS-x64.zip
          release-files/DecoupleTool-Windows-x64.zip
          release-files/DecoupleTool-Linux-x64.zip
          release-files/DecoupleTool-Linux-x64.AppImage
        generate_release_notes: true
